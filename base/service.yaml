# Services for Grafana Loki
#
# 1. ClusterIP — Alloy menulis logs ke Loki (internal)
# 2. NodePort  — Grafana eksternal query logs dari Loki
#    Akses Loki: http://<node-ip>:30100

apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: loki
  labels:
    app.kubernetes.io/name:      loki
    app.kubernetes.io/component: log-storage
spec:
  type: ClusterIP
  selector:
    app: loki
  ports:
    - name:       http
      port:       3100
      targetPort: http
      protocol:   TCP

---

apiVersion: v1
kind: Service
metadata:
  name: loki-np
  namespace: loki
  labels:
    app.kubernetes.io/name:      loki
    app.kubernetes.io/component: log-storage-nodeport
spec:
  type: NodePort
  selector:
    app: loki
  ports:
    - name:       http
      port:       3100
      targetPort: http
      protocol:   TCP
      nodePort:   30100   # Grafana datasource Loki: http://<node-ip>:30100
